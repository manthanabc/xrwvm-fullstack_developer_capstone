<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Post Review | AutoHub Dealerships</title>
    <link rel="stylesheet" href="/static/bootstrap.min.css">
    <link rel="stylesheet" href="/static/style.css">
    <style>
      .mock-browser { border: 1px solid #d0d0d0; border-radius: 8px; padding: 8px; margin: 16px auto; width: 95%; background: #f7f7f7; }
      .address-bar { font-family: monospace; background: #ffffff; border: 1px solid #ccc; padding: 6px 10px; border-radius: 6px; }
    </style>
  </head>
  <body>
    <div class="mock-browser">
      <div class="address-bar">https://your-app-name.onrender.com/postreview/15</div>
    </div>

    <div class="card" style="width: 70%; margin: 2% auto; padding: 20px;">
      <div style="display:flex; justify-content: space-between; align-items: center;">
        <h2 style="color: #555;">Tempsoft Car Dealership</h2>
        <span style="font-weight: bold; color: #333; padding: 6px 10px; background: #e9f7ff; border-radius: 6px;">demo_user</span>
      </div>
      <div style="margin-top: 16px;">
        <label>Review</label>
        <textarea class="form-control" rows="4">Fantastic services and a smooth buying experience.</textarea>
      </div>
      <div style="margin-top: 16px;">
        <label>Purchase Date</label>
        <input class="form-control" type="date" value="2026-05-01">
      </div>
      <div style="margin-top: 16px;">
        <label>Car Make and Model</label>
        <select class="form-select">
          <option selected>Audi A4</option>
          <option>Toyota Camry</option>
          <option>Nissan Rogue</option>
        </select>
      </div>
      <div style="margin-top: 16px;">
        <label>Car Year</label>
        <input class="form-control" type="text" value="2023">
      </div>
      <button class="btn btn-primary" style="margin-top: 20px;">Post Review</button>
    </div>
  </body>
</html>
